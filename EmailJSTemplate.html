<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    margin: 0;
    padding: 20px;
    color: #333333;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background-color: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .header {
    background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
    color: #ffffff;
    padding: 25px;
    text-align: center;
  }
  .header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 600;
  }
  .content {
    padding: 30px;
  }
  .intro {
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 25px;
    color: #555555;
  }
  .detail-row {
    margin-bottom: 15px;
    border-bottom: 1px solid #eeeeee;
    padding-bottom: 15px;
  }
  .detail-label {
    font-size: 12px;
    text-transform: uppercase;
    color: #888888;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .detail-value {
    font-size: 16px;
    font-weight: 500;
    color: #222222;
  }
  .message-box {
    background-color: #f9fafb;
    border-left: 4px solid #8B5CF6;
    padding: 15px 20px;
    border-radius: 0 4px 4px 0;
    margin-top: 10px;
    font-size: 15px;
    line-height: 1.6;
    color: #444444;
    white-space: pre-wrap;
  }
  .footer {
    background-color: #f9fafb;
    padding: 15px;
    text-align: center;
    font-size: 12px;
    color: #999999;
    border-top: 1px solid #eeeeee;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>New Portfolio Message ✨</h1>
  </div>
  <div class="content">
    <div class="intro">
      You have received a new message from your portfolio contact form. Kindly review the details below.
    </div>
    
    <div class="detail-row">
      <div class="detail-label">Sender Name</div>
      <div class="detail-value">{{name}}</div>
    </div>
    
    <div class="detail-row">
      <div class="detail-label">Email Address</div>
      <div class="detail-value"><a href="mailto:{{email}}" style="color: #3B82F6; text-decoration: none;">{{email}}</a></div>
    </div>
    
    <div class="detail-row">
      <div class="detail-label">Subject</div>
      <div class="detail-value">{{subject}}</div>
    </div>
    
    <div>
      <div class="detail-label">Message</div>
      <div class="message-box">{{message}}</div>
    </div>
  </div>
  <div class="footer">
    Sent securely via Sathwik Pamu's Portfolio Contact Form
  </div>
</div>
</body>
</html>
